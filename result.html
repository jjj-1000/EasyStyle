<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Generated Design</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    img {
      width:90%;
      max-width: 1200%;
      height:auto;
      max-height: 90vh;
      border-radius:15px;
      box-shadow:0 0 20px black;
      object-fit: contain;
    }
    .buttons {
      position: fixed;
      top: 20px;
      right: 20px;
    }
    .buttons a {
      text-decoration: none;
      padding: 10px 15px;
      background: #ffffffaa;
      color: black;
      margin-left: 10px;
      border-radius: 5px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <img src="{{ image_url }}" alt="Generated Design">
  <div class="buttons">
    <a href="{{ image_url }}" download>Download</a>
    <a href="/speakpage.html">Go Back</a>
  </div>
</body>
</html>
