<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speak to Generate Design</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cursive' cursive;
    }
    body {
        margin: 0;
        padding: 0;
        font-family:Arial;
        text-align:center;
        padding-top:100px;
        background-image: url("https://media.istockphoto.com/id/2151107006/photo/a-living-room-with-a-gray-sofa-white-and-hardwood-paneled-wall-background-and-decoration.jpg?s=612x612&w=0&k=20&c=KZmj6f_P9WS74aGn2l13gsSpwkjitV2fwOaRqSWcer4=") ;
        backdrop-filter: blur(5px); 
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    h1 {
      margin-bottom: 40px;
    }
    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      background-color: #000000;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #a37865;
    }

    #transcript {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.58);
      border-radius: 5px;
      width: 100%;
      max-width: 600px;
      min-height: 100px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .input-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 800px;
      background: rgb(52, 43, 43);
      border-radius: 30px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      padding: 10px 15px;
      gap: 10px;
    }

    .input-bar input[type="text"] {
      flex: 1;
      padding: 10px 15px;
      font-size: 16px;
      border: none;
      border-radius: 20px;
      background: #f2f2f2;
      outline: none;
    }

    .input-bar button {
      background: #a37865;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
    }

    .input-bar button:hover {
      background: #5f27cd;
    }
    h1
    {
      color: black;
      font-size: 50px;
    }
    h2{
      font-size: 40px;
      font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
      padding-bottom: 200px;

    }

  </style>
</head>
<body>
  <!-- for input bar-->
  <div class="input-bar">
    <input type="file" id="imageInput" accept="image/*" hidden onchange="previewImage(event)">
    <button onclick="document.getElementById('imageInput').click()">🖼️</button>

    <input type="text" id="textInput" placeholder="Type or speak your idea...." />

    <button onclick="startRecognition()">🎤</button>
    <button onclick="generateDesign()">➡️</button>
  </div>

  <!-- to Show the selected image -->
  <div style="text-align:center; margin-top: 10px;">
    <img id="preview" style="display: none; max-width: 100%; max-height: 200px; border-radius: 10px;" />
  </div>
<div class="heading">
  <h1>Visualise your imagination into reality</h1>
 <center> <h2>Input your dream style here ...!</h2></center>
</div>

  <script>
    // preview the selected image
    function previewImage(event) {
      const preview = document.getElementById("preview");
      const file = event.target.files[0];
      if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
      }
    }

    // Start Speech Recognition
    function startRecognition() {
      const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = 'en-US';
      recognition.start();

      recognition.onresult = function (event) {
        const speechResult = event.results[0][0].transcript;
        document.getElementById("textInput").value = speechResult;
      };

      recognition.onerror = function (event) {
        alert("Speech error: " + event.error);
      };
    }

    // to handle the generation of immage
    async function generateDesign() {
      const text = document.getElementById("textInput").value;
      const image = document.getElementById("imageInput").files[0];

      if (!text && !image) {
        alert("Please upload an image or type/speak a description.");
        return;
      }

      // Create FormData to send to backend
      const formData = new FormData();
      formData.append('text_input', text);
      if (image) {
        formData.append('image_input', image);
      }

      // Send request to backend (Flask)
      try {
        const response = await fetch('/generate', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();

        if (result.status === 'success') {
          alert("Design generated successfully!");
          // You can display the image here
          document.getElementById("preview").src = result.image_url;  // Assuming backend returns image URL
          document.getElementById("preview").style.display = "block";
        } else {
          alert("Error generating design: " + result.message);
        }
      } catch (error) {
        alert("Error connecting to backend: " + error.message);
      }
    }
  </script> 
    
</body>
</html>
