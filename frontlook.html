  <style>
    * {

      font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    }
    

/* Overlay */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  z-index: -1;
}


/* Animation */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.hero h2,
.hero p,
.btn {
  animation: fadeInUp 2s ease-in-out;
}
    body {
      margin: 0;
      padding: 0;
      background-image: url("https://images.unsplash.com/photo-1505693416388-ac5ce068fe85"); /* image path */

      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      

    }
    header {
      background-color: rgba(102, 102, 102, 0);

    }

      color: #fff;
      font-weight: 600;
    }

      padding: 100px 50px;

    }
    .hero {

    .btn {
      background-color: #000000;

      border-radius: 5px;

      font-size: 16px;

    }
    .btn:hover {
      background-color: rgba(81, 39, 39, 0.885);
    }
    .speech-input {
      margin-top: 40px;
    }
    .navbar:hover
    {
      text-decoration: underline;

    }
    #transcript {
      margin-top: 20px;
      font-size: 18px;

      border-radius: 5px;
    }
