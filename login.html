<!DOCTYPE html>
<html>

<head>
<title>Login</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial;

background-image:url("https://images.unsplash.com/photo-1505693416388-ac5ce068fe85");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;

display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:rgba(0,0,0,0.7);
padding:40px;
border-radius:15px;
text-align:center;
color:white;
width:300px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
padding:12px 20px;
background:black;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
button:hover{
background:#333;
}

</style>
</head>

<body>

<div class="login-box">

<h1>EasyStyle Login</h1>

<input type="email" placeholder="Enter Email">


<input type="password" placeholder="Enter Password">

<br><br>







<a href="/speakpage.html">
<button>Login</button>
</a>

</div>

</body>
</html>
